<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>החידון | Star Wars: Jedi or Sith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="quiz">

  <header id="site-header"></header>

  <main class="page-content">

    <section class="section">
      <span class="eyebrow">החידון</span>
      <h1>לאיזה צד של הכוח אתה שייך?</h1>
      <p class="lead">ענו על שלוש השאלות בכנות. בסוף החידון תגלו אם מקומכם לצד האור או לצד האפל (השאלות נכתבו על ידי אבא שלי).</p>
    </section>

    <form id="quiz-form" class="section">


      <fieldset class="question-card">
        <legend>שאלה 1 מתוך 3</legend>
        <p class="question-text">אויב חזק עומד מולך בקרב. מה תעשה כדי לנצח?</p>
        <div class="answer-grid">

          <label class="answer-option">
            <input type="radio" name="q1" data-jedi="2" data-sith="0" required>
            <span>אשמור על קור רוח ואחכה בסבלנות לרגע הנכון לפעול</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q1" data-jedi="1" data-sith="0">
            <span>אגן על חבריי, גם אם המשמעות היא להפסיד בקרב</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q1" data-jedi="0" data-sith="1">
            <span>אשתמש בכל יכולתי כדי לגבור עליו</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q1" data-jedi="0" data-sith="2">
            <span>אעשה כל מה שצריך כדי לנצח, בכל מחיר</span>
          </label>

        </div>
      </fieldset>

      <fieldset class="question-card">
        <legend>שאלה 2 מתוך 3</legend>
        <p class="question-text">איך אתה מתמודד עם כעס?</p>
        <div class="answer-grid">

          <label class="answer-option">
            <input type="radio" name="q2" data-jedi="2" data-sith="0" required>
            <span>מתמקד בנשימה ובמדיטציה עד שהוא חולף</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q2" data-jedi="1" data-sith="0">
            <span>מנסה להבין מאיפה הוא מגיע ולומד ממנו</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q2" data-jedi="0" data-sith="1">
            <span>משתמש בו כדי להניע אותי קדימה</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q2" data-jedi="0" data-sith="2">
            <span>משחרר אותו במלואו — הוא המקור לכוח</span>
          </label>

        </div>
      </fieldset>

      <fieldset class="question-card">
        <legend>שאלה 3 מתוך 3</legend>
        <p class="question-text">מה הכי חשוב לך כשאתה מנהיג קבוצה?</p>
        <div class="answer-grid">

          <label class="answer-option">
            <input type="radio" name="q3" data-jedi="2" data-sith="0" required>
            <span>לשרת את הכלל ולדאוג שכולם שווים</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q3" data-jedi="1" data-sith="0">
            <span>לשתף פעולה ולהקשיב לדעות אחרות</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q3" data-jedi="0" data-sith="1">
            <span>לזכות בכבוד באמצעות עוצמה אישית</span>
          </label>

          <label class="answer-option">
            <input type="radio" name="q3" data-jedi="0" data-sith="2">
            <span>לשלוט במצב ולהיות זה שמחליט, תמיד</span>
          </label>

        </div>
      </fieldset>


      <div class="quiz-actions">
        <button type="submit" class="btn btn-gold">שלח ובדוק תוצאה</button>
      </div>

    </form>

    <section id="result-panel" class="result-panel" hidden>
      <h2 id="result-title"></h2>
      <p id="result-message"></p>
      <div class="result-actions">
        <a id="result-continue" href="#" class="btn btn-gold"></a>
        <button id="retake-quiz-btn" type="button" class="btn">בצע את החידון מחדש</button>
      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script src="script.js"></script>
</body>
</html>
