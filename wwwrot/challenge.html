<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>האתגר | Star Wars: Jedi or Sith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="challenge">

  <header id="site-header"></header>

  <main class="page-content">

    <section class="section">
      <span class="eyebrow">האתגר</span>
      <h1>חזקו את הסיעה שלכם</h1>
      <p class="lead">כל תשובה נכונה בשאלת חשבון מוסיפה נקודה אחת לסיעה שלכם. הניקוד משותף לכל המבקרים באתר!</p>
    </section>

    <section class="section">
      <div class="score-board">
        <div class="score-pill score-pill--jedi">
          <span class="score-label">JEDI</span>
          <span class="score-value" id="score-jedi">—</span>
        </div>
        <div class="score-pill score-pill--sith">
          <span class="score-label">SITH</span>
          <span class="score-value" id="score-sith">—</span>
        </div>
      </div>
      <p class="score-leader" id="score-leader">טוען ניקוד...</p>
    </section>

    <section class="section">
      <div class="math-card">
        <h2>שאלת חשבון</h2>
        <p class="math-question" id="math-question">...</p>

        <form id="math-form" class="math-form">
          <input
            type="text"
            id="math-answer"
            inputmode="numeric"
            placeholder="התשובה שלך"
            aria-label="התשובה שלך"
            autocomplete="off"
          >
          <button type="submit" id="math-submit-btn" class="btn btn-gold">שלח תשובה</button>
        </form>

        <p class="feedback-message" id="math-feedback"></p>

        <div class="math-card-actions">
          <button type="button" id="new-question-btn" class="btn">שאלה חדשה</button>
        </div>
      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script src="script.js"></script>
</body>
</html>
